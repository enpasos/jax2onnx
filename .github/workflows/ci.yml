name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**' 
      - 'onnx/**' 
      - 'AGENTS.md'
      - 'work_notes**' 
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**' 
      - 'onnx/**' 
      - 'AGENTS.md'
      - 'work_notes**'

jobs:
  onnxruntime-web-smoke:
    name: onnxruntime-web smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: npm

    - name: Install Poetry
      run: pip install "poetry>=2.0,<3.0"

    - name: Install Python dependencies
      run: poetry install --no-interaction

    - name: Install Node dependencies
      run: npm ci

    - name: Generate tests
      run: poetry run python scripts/generate_tests.py

    - name: Run onnxruntime-web smoke checks
      run: scripts/run_onnxruntime_web_smoke.sh

  onnxruntime-web-full:
    name: onnxruntime-web full
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: npm

    - name: Install Poetry
      run: pip install "poetry>=2.0,<3.0"

    - name: Install Python dependencies
      run: |
        poetry install --no-interaction
        poetry run pip install pytest-xdist

    - name: Install Node dependencies
      run: npm ci

    - name: Generate tests
      run: poetry run python scripts/generate_tests.py

    - name: Run full onnxruntime-web checks
      env:
        JAX_PLATFORMS: cpu
        JAX_ENABLE_X64: "True"
      run: |
        scripts/run_onnxruntime_web_full.sh \
          -n auto \
          --dist=loadscope \
          --durations=50 \
          --durations-min=1

  minimum-dependencies:
    name: minimum dependency versions
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install Poetry
      run: pip install "poetry>=2.0,<3.0"

    - name: Install dependencies
      run: |
        poetry install --no-interaction
        poetry run python scripts/install_minimum_dependencies.py
        poetry run pip check

    - name: Report dependency versions
      run: |
        poetry run python - <<'PY'
        import flax
        import jax
        import onnx
        import onnx_ir
        import onnxruntime

        print(f"jax=={jax.__version__}")
        print(f"flax=={flax.__version__}")
        print(f"onnx=={onnx.__version__}")
        print(f"onnx-ir=={onnx_ir.__version__}")
        print(f"onnxruntime=={onnxruntime.__version__}")
        PY

    - name: Generate tests
      run: poetry run python scripts/generate_tests.py

    - name: Run minimum-version compatibility checks
      env:
        JAX_PLATFORMS: cpu
        JAX_ENABLE_X64: "True"
      run: |
        poetry run pytest -q \
          tests/extra_tests/framework/test_jax_compat.py \
          tests/extra_tests/framework/test_minimum_dependency_installer.py \
          tests/primitives/test_linen.py \
          tests/extra_tests/test_bfloat16_capability_matrix.py

  test: 
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      run: pip install "poetry>=2.0,<3.0"

    - name: Install dependencies
      run: |
        poetry install --no-interaction
        poetry run pip install pytest-xdist

    - name: Run full checks (with MaxText and MaxDiffusion)
      if: matrix.python-version == '3.12'
      env:
        JAX2ONNX_RUN_MAXTEXT: "1"
        JAX2ONNX_RUN_MAXDIFFUSION: "1"
      run: ./scripts/run_all_checks.sh

    - name: Run full checks
      if: matrix.python-version != '3.12'
      env:
        JAX2ONNX_RUN_MAXTEXT: "0"
        JAX2ONNX_MAXTEXT_SRC: ""
        JAX2ONNX_MAXTEXT_MODELS: ""
        JAX2ONNX_RUN_MAXDIFFUSION: "0"
        JAX2ONNX_MAXDIFFUSION_SRC: ""
        JAX2ONNX_MAXDIFFUSION_MODELS: ""
      run: ./scripts/run_all_checks.sh
