name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**' 
      - 'onnx/**' 
      - 'AGENTS.md'
      - 'work_notes**' 
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**' 
      - 'onnx/**' 
      - 'AGENTS.md'
      - 'work_notes**'

jobs:
  test: 
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      run: pip install "poetry>=2.0,<3.0"

    - name: Install dependencies
      run: |
        poetry install --no-interaction
        poetry run pip install pytest-xdist

    - name: Run full checks (with MaxText and MaxDiffusion)
      if: matrix.python-version == '3.12'
      env:
        JAX2ONNX_RUN_MAXTEXT: "1"
        JAX2ONNX_RUN_MAXDIFFUSION: "1"
      run: ./scripts/run_all_checks.sh

    - name: Run full checks
      if: matrix.python-version != '3.12'
      env:
        JAX2ONNX_RUN_MAXTEXT: "0"
        JAX2ONNX_MAXTEXT_SRC: ""
        JAX2ONNX_MAXTEXT_MODELS: ""
        JAX2ONNX_RUN_MAXDIFFUSION: "0"
        JAX2ONNX_MAXDIFFUSION_SRC: ""
        JAX2ONNX_MAXDIFFUSION_MODELS: ""
      run: ./scripts/run_all_checks.sh
